# Dependabot will run on day 3 of each month at 03:53 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'npm'
    directories:
      - '/'
      - 'src-admin/'
    schedule:
      interval: 'cron'
      cronjob: '5 4 14 * *'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 15
    assignees:
      - 'ticaki'
    versioning-strategy: 'increase'
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      cronjob: '5 4 14 * *'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 15
    assignees:
      - 'ticaki'
